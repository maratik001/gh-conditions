name: matrix example
on:
  push:
    branches:
      - main
jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        node-version: [14, 16, 18]
        os: [ubuntu, windows, macos]
        exclude:
          - node-version: 14
            os: macos
    runs-on: ${{ matrix.os }}-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
